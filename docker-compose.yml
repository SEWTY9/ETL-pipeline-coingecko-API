services:
  postgres:
    image: postgres:15
    container_name: crypto_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - crypto-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: crypto_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crypto-network

  etl:
    build: ./etl
    container_name: crypto_etl
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./etl:/app
    command: ["python", "main.py"]
    networks:
      - crypto-network

  airflow-webserver:
    image: apache/airflow:2.9.1
    container_name: crypto_airflow_webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__RBAC: "True"
      AIRFLOW__WEBSERVER__SECRET_KEY: "your-secret-key-change-this-in-production"
      AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho="
      AIRFLOW__WEBSERVER__WORKERS: "1"
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: "300"
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: "300"
      PYTHONPATH: "/opt/airflow:/opt/airflow/etl"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    ports:
      - "8080:8080"
    command: >
      bash -c "
      until pg_isready -h postgres -U postgres; do
        echo 'Waiting for Postgres...';
        sleep 2;
      done;
      airflow db init;
      airflow users create --username airflow --password airflow --firstname admin --lastname admin --role Admin --email admin@example.com || true;
      airflow webserver;
      "
    networks:
      - crypto-network

  airflow-scheduler:
    image: apache/airflow:2.9.1
    container_name: crypto_airflow_scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow_db
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      PYTHONPATH: "/opt/airflow:/opt/airflow/etl"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./etl:/opt/airflow/etl
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    command: >
      bash -c "
      until pg_isready -h postgres -U postgres; do
        echo 'Waiting for Postgres...';
        sleep 2;
      done;
      airflow scheduler;
      "
    networks:
      - crypto-network

volumes:
  postgres_data:

networks:
  crypto-network:
    driver: bridge